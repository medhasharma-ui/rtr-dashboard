name: Incremental sync (Event Log, every 15 min)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python sync_events.py
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          SUPABASE_URL: https://ercbzutulfrerwmkndhy.supabase.co
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
